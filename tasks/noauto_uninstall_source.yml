---
- name: Uninstall wireshark from source
  block:
    - name: Find existing wireshark folder in {{ wireshark_install_dir }}
      ansible.builtin.find:
        paths: "{{ wireshark_install_dir }}"
        patterns: "wireshark-*"
        file_type: directory
      register: wireshark_install_folder

    - name: Remove existing wireshark installation folder
      ansible.builtin.file:
        path: "{{ folder.path }}"
        state: absent
      loop: "{{ wireshark_install_folder.files }}"
      loop_control:
        loop_var: folder
      become: true

    - name: Remove wireshark symlink
      ansible.builtin.file:
        path: "/usr/local/bin/{{ binary }}"
        state: absent
      loop:
        - capinfos
        - captype
        - dumpcap
        - editcap
        - idl2wrs
        - mergecap
        - randpkt
        - rawshark
        - recordercap
        - sharkd
        - text2pcap
        - tshark
        - wireshark
      loop_control:
        loop_var: binary
      become: true

    - name: Remove desktop file
      ansible.builtin.file:
        path: "/usr/local/share/applications/wireshark.desktop"
        state: absent
      become: true

    - name: Remove Wireshark icon from system directory
      ansible.builtin.file:
        path: "/usr/share/icons/hicolor/128x128/apps/org.wireshark.Wireshark.png"
        state: absent
      become: true
      failed_when: false

    - name: Update desktop database after removal
      ansible.builtin.command:
        cmd: update-desktop-database /usr/local/share/applications
      changed_when: false
      failed_when: false
      become: true

    - name: Update icon cache after removal
      ansible.builtin.command:
        cmd: gtk-update-icon-cache -f -t /usr/share/icons/hicolor
      changed_when: false
      failed_when: false
      become: true
